<svg xmlns="http://www.w3.org/2000/svg" width="720" height="472" viewBox="0 0 720 472" font-family="Menlo, Consolas, monospace" font-size="14" xml:space="preserve">
  <rect width="720" height="472" rx="10" fill="#101418"/>
  <circle cx="24" cy="22" r="6" fill="#ff5f56"/>
  <circle cx="44" cy="22" r="6" fill="#ffbd2e"/>
  <circle cx="64" cy="22" r="6" fill="#27c93f"/>
  <text x="360" y="27" fill="#8b949e" text-anchor="middle" font-size="12">okpage — a status page that is just files</text>
  <g fill="#c9d1d9">
    <text x="24" y="62"><tspan fill="#7ee787">$</tspan> okpage check --build</text>
    <text x="24" y="92">   <tspan fill="#7ee787">up</tspan>  Website                 12 ms  200</text>
    <text x="24" y="114">   <tspan fill="#7ee787">up</tspan>  API                      8 ms  200</text>
    <text x="24" y="136">   <tspan fill="#7ee787">up</tspan>  DNS zone                 3 ms  2 addresses</text>
    <text x="24" y="158"> <tspan fill="#f85149">DOWN</tspan>  Postgres                       timeout</text>
    <text x="24" y="180">3 up, 1 down</text>
    <text x="24" y="202" fill="#79c0ff">wrote 6 files to public</text>
    <text x="24" y="224" fill="#8b949e">  index.html</text>
    <text x="24" y="246" fill="#8b949e">  status.json</text>
    <text x="24" y="268" fill="#8b949e">  badge/website.svg</text>
    <text x="24" y="290" fill="#8b949e">  badge/api.svg</text>
    <text x="24" y="312" fill="#8b949e">  badge/dns-zone.svg</text>
    <text x="24" y="334" fill="#8b949e">  badge/postgres.svg</text>
    <text x="24" y="356" fill="#f85149">okpage: 1 of 4 services down</text>
    <text x="24" y="390"><tspan fill="#7ee787">$</tspan> rsync -a public/ deploy@web:/var/www/status/   <tspan fill="#8b949e"># or git push, or s3 sync</tspan></text>
    <text x="24" y="420" fill="#d2a8ff">public/index.html</text>
    <text x="24" y="442" fill="#8b949e">  Partial outage · 90-day bars · incidents from markdown · zero JavaScript</text>
  </g>
</svg>
